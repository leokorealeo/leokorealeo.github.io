<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 시작 페이지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    transition: background 1.5s ease;
    color: #fff;
    overflow-x: hidden;
    padding: 40px 20px;
  }

  body.morning {
    background: linear-gradient(135deg, #ffd89b 0%, #ff9a8b 50%, #ff6a88 100%);
  }
  body.afternoon {
    background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 50%, #6c5ce7 100%);
  }
  body.evening {
    background: linear-gradient(135deg, #fd746c 0%, #ff9068 50%, #c44569 100%);
  }
  body.night {
    background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
  }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 10;
  }
  .theme-toggle:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.1);
  }

  .greeting {
    font-size: clamp(18px, 2.5vw, 24px);
    font-weight: 300;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeInDown 1s ease forwards;
    letter-spacing: 0.5px;
  }

  .time {
    font-size: clamp(56px, 10vw, 100px);
    font-weight: 200;
    letter-spacing: -3px;
    line-height: 1;
    opacity: 0;
    animation: fadeInDown 1s ease 0.2s forwards;
    text-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
  }
  .time .seconds {
    font-size: 0.5em;
    opacity: 0.7;
    margin-left: 8px;
    font-weight: 300;
  }

  .date {
    font-size: clamp(16px, 2vw, 20px);
    font-weight: 300;
    margin-top: 12px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeInDown 1s ease 0.4s forwards;
    letter-spacing: 1px;
  }

  .search-container {
    width: 100%;
    max-width: 600px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.6s forwards;
  }

  .search-form {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 50px;
    padding: 6px 6px 6px 24px;
    transition: all 0.3s ease;
  }
  .search-form:focus-within {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.5);
    transform: translateY(-2px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  }

  .search-icon {
    color: rgba(255, 255, 255, 0.8);
    font-size: 18px;
    margin-right: 12px;
  }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 16px;
    padding: 14px 0;
    font-family: inherit;
  }
  .search-input::placeholder {
    color: rgba(255, 255, 255, 0.6);
  }

  .search-button {
    background: rgba(255, 255, 255, 0.9);
    border: none;
    color: #333;
    padding: 12px 24px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .search-button:hover {
    background: #fff;
    transform: scale(1.03);
  }

  .shortcuts {
    margin-top: 32px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeInUp 1s ease 0.8s forwards;
  }

  .shortcut {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    width: 64px;
    height: 64px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #fff;
    transition: all 0.3s ease;
    cursor: pointer;
    gap: 3px;
  }
  .shortcut:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }
  .shortcut-icon {
    font-size: 22px;
  }
  .shortcut-label {
    font-size: 9px;
    font-weight: 500;
    opacity: 0.9;
  }

  /* 증시 섹션 */
  .market-section {
    width: 100%;
    max-width: 900px;
    margin-top: 48px;
    opacity: 0;
    animation: fadeInUp 1s ease 1s forwards;
  }

  .market-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 4px;
  }
  .market-title {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .market-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    opacity: 0.85;
  }
  .refresh-btn {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  .refresh-btn:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: rotate(180deg);
  }
  .refresh-btn.spinning {
    animation: spin 1s linear infinite;
  }

  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }

  .stock-card {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 16px;
    padding: 16px;
    transition: all 0.3s ease;
  }
  .stock-card:hover {
    background: rgba(255, 255, 255, 0.18);
    transform: translateY(-2px);
  }

  .stock-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .stock-name {
    font-size: 14px;
    font-weight: 500;
  }
  .stock-category {
    font-size: 10px;
    background: rgba(255, 255, 255, 0.2);
    padding: 2px 8px;
    border-radius: 10px;
    opacity: 0.9;
  }
  .stock-value {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .stock-change {
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stock-change.up { color: #ff6b6b; }
  .stock-change.down { color: #4dabf7; }
  .stock-change.flat { color: rgba(255, 255, 255, 0.8); }

  .market-loading, .market-error {
    grid-column: 1 / -1;
    text-align: center;
    padding: 32px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    font-size: 14px;
    opacity: 0.9;
  }
  .market-error {
    background: rgba(255, 100, 100, 0.15);
  }

  .skeleton {
    background: linear-gradient(90deg,
      rgba(255,255,255,0.08) 25%,
      rgba(255,255,255,0.15) 50%,
      rgba(255,255,255,0.08) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .time { letter-spacing: -2px; }
    .shortcut { width: 56px; height: 56px; }
    .shortcut-icon { font-size: 18px; }
    .search-button { padding: 10px 18px; font-size: 13px; }
    .market-grid { grid-template-columns: repeat(2, 1fr); }
    .stock-value { font-size: 18px; }
  }
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="테마 변경">🎨</button>

  <div class="greeting" id="greeting">좋은 하루예요</div>
  <div class="time" id="time">00:00<span class="seconds" id="seconds">00</span></div>
  <div class="date" id="date">불러오는 중...</div>

  <div class="search-container">
    <div class="search-form">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="검색어를 입력하세요..." autofocus>
      <button class="search-button" id="searchButton">검색</button>
    </div>
  </div>

  <div class="shortcuts">
    <a href="https://www.youtube.com" target="_blank" class="shortcut" title="YouTube">
      <span class="shortcut-icon">📺</span><span class="shortcut-label">YouTube</span>
    </a>
    <a href="https://gmail.com" target="_blank" class="shortcut" title="Gmail">
      <span class="shortcut-icon">✉️</span><span class="shortcut-label">Gmail</span>
    </a>
    <a href="https://finance.naver.com" target="_blank" class="shortcut" title="네이버 증권">
      <span class="shortcut-icon">📈</span><span class="shortcut-label">증권</span>
    </a>
    <a href="https://github.com" target="_blank" class="shortcut" title="GitHub">
      <span class="shortcut-icon">💻</span><span class="shortcut-label">GitHub</span>
    </a>
    <a href="https://maps.google.com" target="_blank" class="shortcut" title="지도">
      <span class="shortcut-icon">🗺️</span><span class="shortcut-label">지도</span>
    </a>
    <a href="https://translate.google.com" target="_blank" class="shortcut" title="번역">
      <span class="shortcut-icon">🌐</span><span class="shortcut-label">번역</span>
    </a>
    <a href="https://drive.google.com" target="_blank" class="shortcut" title="드라이브">
      <span class="shortcut-icon">📁</span><span class="shortcut-label">드라이브</span>
    </a>
  </div>

<script>
  /* ===== 시계 & 인사말 & 테마 ===== */
  const themes = ['morning', 'afternoon', 'evening', 'night'];
  let manualTheme = null;

  function getAutoTheme() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12) return 'morning';
    if (h >= 12 && h < 17) return 'afternoon';
    if (h >= 17 && h < 20) return 'evening';
    return 'night';
  }
  function getGreeting() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12) return '좋은 아침이에요 ☀️';
    if (h >= 12 && h < 17) return '활기찬 오후예요 🌤️';
    if (h >= 17 && h < 20) return '편안한 저녁이에요 🌅';
    return '고요한 밤이에요 🌙';
  }
  function applyTheme() {
    document.body.className = manualTheme || getAutoTheme();
  }
  function pad(n) { return n.toString().padStart(2, '0'); }
  function updateClock() {
    const now = new Date();
    document.getElementById('time').innerHTML =
      pad(now.getHours()) + ':' + pad(now.getMinutes()) +
      '<span class="seconds">' + pad(now.getSeconds()) + '</span>';
    const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
    document.getElementById('date').textContent =
      now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 ' + days[now.getDay()];
    document.getElementById('greeting').textContent = getGreeting();
  }

  /* ===== 검색 ===== */
  function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (q) {
      window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
      document.getElementById('searchInput').value = '';
    }
  }
  document.getElementById('searchButton').addEventListener('click', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = manualTheme || getAutoTheme();
    manualTheme = themes[(themes.indexOf(current) + 1) % themes.length];
    applyTheme();
  });

  /* ===== 초기화 ===== */
  applyTheme();
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(() => { if (!manualTheme) applyTheme(); }, 60000);
</script>
</body>
</html>
