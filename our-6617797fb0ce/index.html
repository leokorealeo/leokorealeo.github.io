<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 검색엔진 노출 차단 -->
<meta name="robots" content="noindex, nofollow, noimageindex, noarchive">
<meta name="referrer" content="no-referrer">
<title>우리 아이 갤러리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
    padding: 36px 18px 80px;
    transition: background 1.5s ease;
    background: linear-gradient(135deg, #ffd89b 0%, #ff9a8b 50%, #ff6a88 100%);
  }
  body.morning   { background: linear-gradient(135deg, #ffd89b 0%, #ff9a8b 50%, #ff6a88 100%); }
  body.afternoon { background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 50%, #6c5ce7 100%); }
  body.evening   { background: linear-gradient(135deg, #fd746c 0%, #ff9068 50%, #c44569 100%); }
  body.night     { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }

  .wrap { max-width: 1100px; margin: 0 auto; }

  header.top {
    text-align: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeInDown 1s ease forwards;
  }
  .title {
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 300;
    letter-spacing: 0.5px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.15);
  }
  .subtitle {
    margin-top: 10px;
    font-size: clamp(13px, 2vw, 16px);
    font-weight: 300;
    opacity: 0.85;
  }

  /* 그리드 (반응형 메이슨리) */
  .gallery {
    column-count: 4;
    column-gap: 14px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.3s forwards;
  }
  @media (max-width: 1000px) { .gallery { column-count: 3; } }
  @media (max-width: 680px)  { .gallery { column-count: 2; } }
  @media (max-width: 380px)  { .gallery { column-count: 1; } }

  .tile {
    position: relative;
    break-inside: avoid;
    margin-bottom: 14px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 6px 22px rgba(0,0,0,0.12);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .tile:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(0,0,0,0.28); }
  .tile img { display: block; width: 100%; height: auto; }

  .tile .badge {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    display: flex; align-items: center; gap: 4px;
  }
  .tile .date {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 22px 12px 10px;
    font-size: 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0));
    opacity: 0; transition: opacity 0.25s ease;
  }
  .tile:hover .date { opacity: 1; }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .play-overlay span {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; padding-left: 4px;
  }

  /* 빈 상태 / 로딩 */
  .msg {
    text-align: center;
    padding: 60px 24px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.7;
    opacity: 0.95;
  }
  .msg .big { font-size: 40px; display:block; margin-bottom: 14px; }

  /* 라이트박스 */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img, .lightbox video {
    max-width: 100%;
    max-height: 88vh;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lb-close, .lb-nav {
    position: absolute;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    user-select: none;
  }
  .lb-close { top: 18px; right: 18px; width: 46px; height: 46px; font-size: 22px; }
  .lb-nav { top: 50%; transform: translateY(-50%); width: 52px; height: 52px; font-size: 26px; }
  .lb-prev { left: 18px; }
  .lb-next { right: 18px; }
  .lb-close:hover, .lb-nav:hover { background: rgba(255,255,255,0.28); }
  @media (max-width: 600px) { .lb-nav { width: 42px; height: 42px; font-size: 20px; } }

  @keyframes fadeInDown { from { opacity:0; transform: translateY(-20px);} to {opacity:1; transform:translateY(0);} }
  @keyframes fadeInUp   { from { opacity:0; transform: translateY(20px);}  to {opacity:1; transform:translateY(0);} }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="title">🌸 우리 아이</div>
      <div class="subtitle" id="subtitle">소중한 순간들</div>
    </header>
    <div id="content">
      <div class="msg"><span class="big">⏳</span>불러오는 중...</div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lb-close" id="lbClose">×</div>
    <div class="lb-nav lb-prev" id="lbPrev">‹</div>
    <div class="lb-nav lb-next" id="lbNext">›</div>
    <div id="lbStage"></div>
  </div>

<script>
  /* 시간대별 배경 테마 (시작페이지와 동일) */
  function applyTheme() {
    const h = new Date().getHours();
    let t = 'night';
    if (h >= 5 && h < 12) t = 'morning';
    else if (h >= 12 && h < 17) t = 'afternoon';
    else if (h >= 17 && h < 20) t = 'evening';
    document.body.className = t;
  }
  applyTheme();
  setInterval(applyTheme, 60000);

  function fmtDate(s) {
    const d = new Date(s);
    if (isNaN(d)) return '';
    const days = ['일','월','화','수','목','금','토'];
    return d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' (' + days[d.getDay()] + ')';
  }

  let items = [];

  function buildGallery(data) {
    items = (data.items || []).slice();
    const content = document.getElementById('content');

    if (items.length === 0) {
      content.innerHTML = '<div class="msg"><span class="big">📷</span>'
        + '아직 올라온 사진·영상이 없어요.<br>'
        + '컴퓨터의 <b>“딸 갤러리”</b> 폴더에 사진이나 영상을 넣으면<br>잠시 후 여기에 자동으로 나타납니다.</div>';
      return;
    }

    const sub = document.getElementById('subtitle');
    sub.textContent = '소중한 순간들 · 사진과 영상 ' + items.length + '개';

    const grid = document.createElement('div');
    grid.className = 'gallery';

    items.forEach((it, idx) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.idx = idx;

      const thumb = it.type === 'video' ? (it.poster || it.src) : it.src;
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = thumb;
      img.alt = '';
      tile.appendChild(img);

      if (it.type === 'video') {
        tile.insertAdjacentHTML('beforeend',
          '<div class="badge">🎬 영상</div><div class="play-overlay"><span>▶</span></div>');
      }
      if (it.date) {
        const d = document.createElement('div');
        d.className = 'date';
        d.textContent = fmtDate(it.date);
        tile.appendChild(d);
      }

      tile.addEventListener('click', () => openLightbox(idx));
      grid.appendChild(tile);
    });

    content.innerHTML = '';
    content.appendChild(grid);
  }

  /* 라이트박스 */
  const lightbox = document.getElementById('lightbox');
  const stage = document.getElementById('lbStage');
  let current = -1;

  function renderStage() {
    const it = items[current];
    stage.innerHTML = '';
    if (!it) return;
    if (it.type === 'video') {
      const v = document.createElement('video');
      v.src = it.src;
      v.controls = true;
      v.autoplay = true;
      v.playsInline = true;
      if (it.poster) v.poster = it.poster;
      stage.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = it.src;
      stage.appendChild(img);
    }
  }
  function openLightbox(idx) { current = idx; renderStage(); lightbox.classList.add('open'); }
  function closeLightbox() { lightbox.classList.remove('open'); stage.innerHTML = ''; current = -1; }
  function navigate(step) {
    if (current < 0) return;
    current = (current + step + items.length) % items.length;
    renderStage();
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
  document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); navigate(1); });
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') navigate(-1);
    else if (e.key === 'ArrowRight') navigate(1);
  });

  /* manifest 불러오기 */
  async function load() {
    try {
      const res = await fetch('manifest.json?_=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('manifest 없음 ' + res.status);
      const data = await res.json();
      buildGallery(data);
    } catch (err) {
      buildGallery({ items: [] });
    }
  }
  load();
  /* 5분마다 새 사진 확인 */
  setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
